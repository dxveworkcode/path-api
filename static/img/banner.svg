<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <rect width="1280" height="320" fill="#000000"/>

  <!-- Wordmark -->
  <text x="72" y="118" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="64" fill="#F5F5F7" letter-spacing="-2">Path</text>
  <text x="72" y="118" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="64" fill="#3D7EFF" letter-spacing="-2" dx="168">.</text>

  <!-- Tagline -->
  <text x="72" y="158" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="18" fill="#86868B">Web URLs to native deep-link schemes. One call.</text>

  <!-- Endpoint pill -->
  <rect x="72" y="186" width="310" height="34" rx="8" fill="#1C1C1E"/>
  <text x="90" y="208" font-family="'Courier New',Courier,monospace" font-size="13" fill="#3D7EFF">GET</text>
  <text x="126" y="208" font-family="'Courier New',Courier,monospace" font-size="13" fill="#F5F5F7">/v1/resolve?url=</text>
  <text x="284" y="208" font-family="'Courier New',Courier,monospace" font-size="13" fill="#86868B">{url}</text>

  <!-- Vertical separator -->
  <line x1="640" y1="56" x2="640" y2="264" stroke="#ffffff" stroke-width="1" stroke-opacity="0.06"/>

  <!-- Stat 1 -->
  <text x="700" y="152" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="60" fill="#F5F5F7" letter-spacing="-2">50+</text>
  <text x="700" y="184" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="14" fill="#86868B">Platforms</text>

  <!-- Stat 2 -->
  <text x="900" y="152" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="60" fill="#F5F5F7" letter-spacing="-2">8ms</text>
  <text x="900" y="184" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="14" fill="#86868B">Avg response</text>

  <!-- Stat 3 -->
  <text x="1100" y="152" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="60" fill="#F5F5F7" letter-spacing="-2">1</text>
  <text x="1100" y="184" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="14" fill="#86868B">Endpoint</text>

  <!-- Bottom label -->
  <text x="72" y="278" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="12" fill="#3D3D42">pthapi.vercel.app</text>
</svg>
