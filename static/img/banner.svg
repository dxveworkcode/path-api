<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080910"/>
      <stop offset="100%" style="stop-color:#0E1020"/>
    </linearGradient>
    <radialGradient id="glo1" cx="75%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#3D7EFF;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#3D7EFF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glo2" cx="15%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8EAED"/>
      <stop offset="60%" style="stop-color:#6BA3FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#glo1)"/>
  <rect width="1280" height="320" fill="url(#glo2)"/>

  <!-- Subtle grid lines -->
  <g stroke="#3D7EFF" stroke-width="0.4" opacity="0.07">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="1278" height="318" rx="12" ry="12" fill="none" stroke="#3D7EFF" stroke-width="1" opacity="0.22"/>

  <!-- Tag pill -->
  <rect x="112" y="72" width="218" height="26" rx="13" fill="#3D7EFF" fill-opacity="0.12" stroke="#3D7EFF" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="127" cy="85" r="4" fill="#3D7EFF"/>
  <text x="140" y="89.5" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="10" letter-spacing="2.5" fill="#3D7EFF" text-anchor="start">DEEP LINK INFRASTRUCTURE</text>

  <!-- Logo wordmark -->
  <text x="112" y="158" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="76" letter-spacing="4" fill="url(#textGrad)" text-anchor="start">P</text>
  <text x="166" y="158" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="76" letter-spacing="4" fill="#3D7EFF" text-anchor="start">·</text>
  <text x="200" y="158" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="76" letter-spacing="4" fill="url(#textGrad)" text-anchor="start">ATH</text>

  <!-- Tagline -->
  <text x="112" y="194" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="300" font-size="17" fill="#7A8290" text-anchor="start">Web URL in. Native app opens. 50+ platforms.</text>

  <!-- Separator -->
  <line x1="112" y1="220" x2="480" y2="220" stroke="#3D7EFF" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Stat pills -->
  <rect x="112" y="240" width="110" height="32" rx="6" fill="#3D7EFF" fill-opacity="0.1" stroke="#3D7EFF" stroke-opacity="0.25" stroke-width="1"/>
  <text x="167" y="260.5" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="12" fill="#E8EAED" text-anchor="middle">50+ Platforms</text>

  <rect x="232" y="240" width="110" height="32" rx="6" fill="#3D7EFF" fill-opacity="0.1" stroke="#3D7EFF" stroke-opacity="0.25" stroke-width="1"/>
  <text x="287" y="260.5" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="12" fill="#E8EAED" text-anchor="middle">REST API</text>

  <rect x="352" y="240" width="110" height="32" rx="6" fill="#3D7EFF" fill-opacity="0.1" stroke="#3D7EFF" stroke-opacity="0.25" stroke-width="1"/>
  <text x="407" y="260.5" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="12" fill="#E8EAED" text-anchor="middle">Free Tier</text>

  <!-- Right side code snippet -->
  <rect x="720" y="60" width="460" height="200" rx="10" fill="#0E0F14" stroke="#3D7EFF" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="720" y="60" width="460" height="36" rx="10" fill="#161820"/>
  <rect x="720" y="84" width="460" height="12" rx="0" fill="#161820"/>
  <!-- Dots -->
  <circle cx="744" cy="78" r="5" fill="#F87171" opacity="0.7"/>
  <circle cx="762" cy="78" r="5" fill="#FBBF24" opacity="0.7"/>
  <circle cx="780" cy="78" r="5" fill="#4ADE80" opacity="0.7"/>
  <!-- Code lines -->
  <text x="740" y="122" font-family="'Courier New',monospace" font-size="12.5" fill="#7A8290">// Resolve any web URL to a native deep-link</text>
  <text x="740" y="148" font-family="'Courier New',monospace" font-size="12.5">
    <tspan fill="#c792ea">const </tspan>
    <tspan fill="#6BA3FF">res </tspan>
    <tspan fill="#E8EAED">= </tspan>
    <tspan fill="#c792ea">await </tspan>
    <tspan fill="#82AAFF">fetch</tspan>
    <tspan fill="#E8EAED">(</tspan>
  </text>
  <text x="756" y="168" font-family="'Courier New',monospace" font-size="12.5" fill="#4ADE80">  `/v1/resolve?url=${'{'}encodeURIComponent(url){'}'}`</text>
  <text x="740" y="188" font-family="'Courier New',monospace" font-size="12.5" fill="#E8EAED">)</text>
  <text x="740" y="212" font-family="'Courier New',monospace" font-size="12.5">
    <tspan fill="#7A8290">// → </tspan>
    <tspan fill="#4ADE80">"spotify:track:4cOdK2wGLETKBW3PvgPWqT"</tspan>
  </text>

  <!-- Corner glow accent -->
  <circle cx="1260" cy="20" r="60" fill="#3D7EFF" fill-opacity="0.06"/>
</svg>
